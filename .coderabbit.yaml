language: "ko-KR"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "dev"
      - "hotfix/.*"
  path_instructions:
    - path: "apps/fe/**"
      instructions: |
        Next.js 16 + React 19 + TypeScript 프론트엔드입니다.
        - 컴포넌트 재사용성과 관심사 분리를 확인해주세요.
        - TanStack Query 사용 패턴이 적절한지 확인해주세요.
        - Tailwind CSS 클래스 사용이 일관적인지 확인해주세요.
        - ESLint/Prettier 규칙 위반이 없는지 확인해주세요.
    - path: "apps/be/**"
      instructions: |
        Spring Boot 3.5 + Java 21 백엔드입니다.
        - REST API 설계가 일관적인지 확인해주세요.
        - JPA 엔티티와 쿼리 성능 이슈를 확인해주세요.
        - 보안 관련 설정(OAuth2, Security)이 적절한지 확인해주세요.
        - Flyway 마이그레이션 스크립트의 안전성을 확인해주세요.
    - path: "apps/ai/**"
      instructions: |
        FastAPI + Python 3.11 AI 서비스입니다.
        - Pydantic 스키마 검증이 적절한지 확인해주세요.
        - API 엔드포인트의 에러 핸들링을 확인해주세요.
        - 비동기 처리가 올바르게 되어 있는지 확인해주세요.
    - path: "apps/be/src/main/resources/db/migration/**"
      instructions: |
        Flyway DB 마이그레이션 파일입니다.
        - 기존 마이그레이션 파일은 절대 수정하면 안 됩니다.
        - 롤백 가능한 DDL인지 확인해주세요.
        - 데이터 유실 가능성이 있는 변경인지 확인해주세요.
  path_filters:
    - "!**/yarn.lock"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/uv.lock"
    - "!dist/**"
    - "!**/build/**"
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/storybook-static/**"
    - "!**/coverage/**"
    - "!assets/**"

chat:
  auto_reply: true
