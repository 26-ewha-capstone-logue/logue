spring.application.name=logue
server.servlet.encoding.force=true
server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=framework

# ================================
# DB
# ================================
#spring.datasource.url=${SPRING_DATASOURCE_URL}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
#spring.datasource.driver-class-name=org.postgresql.Driver

# base application.propertiesмқҳ AutoConfiguration м ңмҷё лӘ©лЎқмқ„ prodм—җм„ң н•ҙм ң
spring.autoconfigure.exclude=

# ================================
# JPA
# ================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Flyway
# ================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ================================
# JWT
# ================================
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration-time=3600000
jwt.refresh-token.expiration-time=604800000

# ================================
# OAuth2 - Google (Prod)
# ================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ================================
# Frontend Redirect / Cookie
# ================================


# ================================
# AI Server Communication
# ================================

# ================================
# DataSource S3 Storage
# SSM Parameter л§Өн•‘ мҳҲмӢң (мҡҙмҳҒ):
#   /logue/aws/region           -> LOGUE_STORAGE_S3_REGION
#   /logue/aws/s3/bucket        -> LOGUE_STORAGE_S3_BUCKET
#   /logue/aws/s3/prefix        -> LOGUE_STORAGE_S3_PREFIX (м„ нғқ, лҜём§Җм • мӢң datasources)
#   /logue/aws/s3/access-key    -> LOGUE_STORAGE_S3_ACCESSKEY (лЎңм»¬ м „мҡ©, мҡҙмҳҒмқҖ IAM Role)
#   /logue/aws/s3/secret-key    -> LOGUE_STORAGE_S3_SECRETKEY (лЎңм»¬ м „мҡ©, мҡҙмҳҒмқҖ IAM Role)
# ================================
logue.storage.s3.region=${LOGUE_STORAGE_S3_REGION:ap-northeast-2}
logue.storage.s3.bucket=${LOGUE_STORAGE_S3_BUCKET:}
logue.storage.s3.prefix=${LOGUE_STORAGE_S3_PREFIX:datasources}
logue.storage.s3.access-key=${LOGUE_STORAGE_S3_ACCESSKEY:}
logue.storage.s3.secret-key=${LOGUE_STORAGE_S3_SECRETKEY:}

