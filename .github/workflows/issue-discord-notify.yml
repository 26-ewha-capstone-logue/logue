name: Discord Notification (Issues)

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Parse part and add label
        id: label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const match = body.match(/### 파트\s*\n+\s*(fe|be|ai)/);
            if (!match) {
              core.setOutput('part', '');
              return;
            }

            const part = match[1];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [part],
            });
            core.setOutput('part', part);

      - name: FE Discord Notification
        if: steps.label.outputs.part == 'fe'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_FE_URL }}
          nodetail: true
          title: '${{ github.event.issue.title }}'
          description: |
            **파트:** FE
            **작성자:** ${{ github.actor }}
            ${{ github.event.issue.html_url }}

      - name: BE Discord Notification
        if: steps.label.outputs.part == 'be'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE_URL }}
          nodetail: true
          title: '${{ github.event.issue.title }}'
          description: |
            **파트:** BE
            **작성자:** ${{ github.actor }}
            ${{ github.event.issue.html_url }}

      - name: AI Discord Notification
        if: steps.label.outputs.part == 'ai'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_AI_URL }}
          nodetail: true
          title: '${{ github.event.issue.title }}'
          description: |
            **파트:** AI
            **작성자:** ${{ github.actor }}
            ${{ github.event.issue.html_url }}
